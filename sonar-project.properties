# SonarQube / SonarCloud configuration
# Docs: https://docs.sonarsource.com/sonarqube-cloud/advanced-setup/analysis-parameters/

# ── Project identification ──────────────────────────────────────────────────
# Replace these with your actual values from sonarcloud.io (or your SonarQube server)
sonar.projectKey=medgraph-ai
sonar.organization=your-github-username-or-org

# ── Source configuration ────────────────────────────────────────────────────
sonar.sources=app,components,hooks,lib
# sonar.tests=__tests__   # uncomment when a test folder exists
sonar.sourceEncoding=UTF-8

# ── TypeScript / JavaScript ─────────────────────────────────────────────────
# sonar.javascript.lcov.reportPaths=coverage/lcov.info   # uncomment when tests generate coverage
sonar.typescript.tsconfigPaths=tsconfig.json

# ── Exclusions ──────────────────────────────────────────────────────────────
sonar.exclusions=\
  node_modules/**,\
  .next/**,\
  public/**,\
  scripts/**,\
  generated/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx

sonar.coverage.exclusions=\
  **/*.config.*,\
  **/types/**,\
  **/ui/**

