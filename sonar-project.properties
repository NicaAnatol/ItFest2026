# SonarQube / SonarCloud configuration
# Docs: https://docs.sonarsource.com/sonarqube-cloud/advanced-setup/analysis-parameters/

# ── Project identification ──────────────────────────────────────────────────
# These must match the project created on sonarcloud.io.
# Create it at: https://sonarcloud.io/projects/create
# For GitHub-imported projects the default key is: <org>_<repo>
sonar.projectKey=NicaAnatol_ItFest2026
sonar.organization=nicaanatol

# ── Source configuration ────────────────────────────────────────────────────
sonar.sources=app,components,hooks,lib
# sonar.tests=__tests__   # uncomment when a test folder exists
sonar.sourceEncoding=UTF-8

# ── TypeScript / JavaScript ─────────────────────────────────────────────────
# sonar.javascript.lcov.reportPaths=coverage/lcov.info   # uncomment when tests generate coverage
sonar.typescript.tsconfigPaths=tsconfig.json

# ── Exclusions ──────────────────────────────────────────────────────────────
sonar.exclusions=\
  node_modules/**,\
  .next/**,\
  public/**,\
  scripts/**,\
  generated/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx

sonar.coverage.exclusions=\
  **/*.config.*,\
  **/types/**,\
  **/ui/**

