# ============================================================================
# MedGraph AI — CI/CD Pipeline
# Push to main → Code Quality → Security → Build & Push to ECR → Deploy to ECS
# ============================================================================
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID          — IAM user with ECR + ECS permissions
#   AWS_SECRET_ACCESS_KEY      — corresponding secret
#   AWS_REGION                 — e.g. eu-central-1
#   ECR_REPOSITORY             — ECR repo name (e.g. medgraph-ai)
#   ECS_CLUSTER                — ECS cluster name
#   ECS_SERVICE                — ECS service name
#   ECS_TASK_DEFINITION        — task definition family name (e.g. medgraph-ai)
#   ECS_CONTAINER_NAME         — container name inside the task definition
#   SONAR_TOKEN                — SonarQube / SonarCloud token
#   SONAR_HOST_URL             — SonarQube server URL (omit for SonarCloud)
#
# Required GitHub Variables (non-secret):
#   SONAR_PROJECT_KEY          — SonarQube project key
#   SONAR_ORG                  — SonarCloud organization (if using SonarCloud)
# ============================================================================

name: CI/CD — Scan · Build · Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  id-token: write       # needed if you switch to OIDC for AWS auth
  security-events: write # for uploading SARIF results

env:
  NODE_VERSION: "22"

# ── Cancel in-progress runs on the same branch ─────────────────────────────
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ============================================================================
jobs:
  # ── 1. Code Quality ──────────────────────────────────────────────────────
  code-quality:
    name: "Code Quality — Lint · Typecheck · SonarQube"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for SonarQube blame

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck
        continue-on-error: true  # don't block on pre-existing TS errors

      - name: SonarQube Scan
        if: github.event_name == 'push' && env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          projectBaseDir: .
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORG }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ── 2. Security ──────────────────────────────────────────────────────────
  security:
    name: "Security — Gitleaks · Trivy"
    runs-on: ubuntu-latest
    needs: []  # runs in parallel with code-quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Gitleaks: detect hard-coded secrets ───────────────────────────
      - name: Gitleaks — secret scanning
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Trivy: filesystem vulnerability scan ──────────────────────────
      - name: Trivy — dependency & IaC scan
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1       # fail the job on CRITICAL/HIGH findings

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  # ── 3. Build & Push to ECR ───────────────────────────────────────────────
  build-and-push:
    name: "Build — Docker · Push to ECR"
    runs-on: ubuntu-latest
    needs: [code-quality, security]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker meta (tags + labels)
        id: meta
        run: |
          REGISTRY=${{ steps.ecr-login.outputs.registry }}
          REPO=${{ secrets.ECR_REPOSITORY }}
          SHA=${GITHUB_SHA::8}
          IMAGE="${REGISTRY}/${REPO}"
          echo "image=${IMAGE}:${SHA}" >> "$GITHUB_OUTPUT"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"
          echo "SHA_TAG=${SHA}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ env.SHA_TAG }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Trivy: scan the built image ────────────────────────────────────
      - name: Trivy — container image scan
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ env.SHA_TAG }}
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          exit-code: 0   # warn only (image is already pushed)

      - name: Upload image scan SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

  # ── 4. Deploy to ECS ─────────────────────────────────────────────────────
  deploy:
    name: "Deploy — Amazon ECS"
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ secrets.ECS_TASK_DEFINITION }} \
            --query 'taskDefinition' \
            --output json > task-definition.json

      - name: Update image in task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ secrets.ECS_CONTAINER_NAME }}
          image: ${{ needs.build-and-push.outputs.image }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE }}
          cluster: ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10

