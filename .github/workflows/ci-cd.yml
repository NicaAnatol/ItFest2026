# ============================================================================
# MedGraph AI — CI/CD Pipeline
# Push to main → Code Quality → Security → Build & Push to ECR → Deploy to ECS
# ============================================================================
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID          — IAM user with ECR + ECS permissions
#   AWS_SECRET_ACCESS_KEY      — corresponding secret
#   AWS_REGION                 — e.g. us-east-1
#   SONAR_TOKEN                — SonarQube / SonarCloud token
#   SONAR_HOST_URL             — SonarQube server URL (defaults to https://sonarcloud.io)
#
# Infrastructure constants (hardcoded — change here if AWS resources are renamed):
#   ECR_REPOSITORY             — medgraph-ai
#   ECS_CLUSTER                — medgraph-ai
#   ECS_SERVICE                — medgraph-ai-service-is5u7ylu
#   ECS_CONTAINER_NAME         — medgraph-ai  (must match .aws/task-definition.json)
#   TARGET_GROUP_ARN           — ALB target group that routes traffic to the service
#
# Required GitHub Variables (non-secret):
#   (none — project key & org are in sonar-project.properties)
# ============================================================================

name: CI/CD — Scan · Build · Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  id-token: write # needed if you switch to OIDC for AWS auth
  security-events: write # for uploading SARIF results

env:
  NODE_VERSION: "22"
  # Dummy URL so `prisma generate` (postinstall) doesn't crash in CI.
  # The real URL is injected at runtime via ECS Secrets Manager.
  DATABASE_URL: "mongodb://ci:27017/ci"
  # ── Infrastructure constants ──────────────────────────────────────────────
  ECR_REPOSITORY: medgraph-ai
  ECS_CLUSTER: medgraph-ai
  ECS_SERVICE: medgraph-ai-service-is5u7ylu
  ECS_CONTAINER_NAME: medgraph-ai
  TARGET_GROUP_ARN: arn:aws:elasticloadbalancing:us-east-1:650080740856:targetgroup/medgraph-ai-tg/2ed7e3e805c7f4c8

# ── Cancel in-progress runs on the same branch ─────────────────────────────
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ============================================================================
jobs:
  # ── 1. Code Quality ──────────────────────────────────────────────────────
  code-quality:
    name: "Code Quality — Lint · Typecheck · SonarQube"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for SonarQube blame

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck
        continue-on-error: true # don't block on pre-existing TS errors

      - name: SonarQube Scan
        # TODO: re-enable once SonarCloud project is imported:
        #   if: github.event_name == 'push' && env.SONAR_TOKEN != ''
        if: false
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: .
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL || 'https://sonarcloud.io' }}

  # ── 2. Security ──────────────────────────────────────────────────────────
  security:
    name: "Security — Gitleaks · Trivy"
    runs-on: ubuntu-latest
    # runs in parallel with code-quality (no needs)

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Gitleaks: detect hard-coded secrets ───────────────────────────
      - name: Gitleaks — secret scanning
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Trivy: filesystem vulnerability scan ──────────────────────────
      - name: Trivy — dependency & IaC scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1 # fail the job on CRITICAL/HIGH findings

      - name: Upload Trivy SARIF
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

  # ── 3. Build & Push to ECR ───────────────────────────────────────────────
  build-and-push:
    name: "Build — Docker · Push to ECR"
    runs-on: ubuntu-latest
    needs: [code-quality, security]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker meta (tags + labels)
        id: meta
        run: |
          REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          REPO="${{ env.ECR_REPOSITORY }}"
          SHA="${GITHUB_SHA::8}"
          IMAGE="${REGISTRY}/${REPO}"
          FULL_IMAGE="${IMAGE}:${SHA}"
          echo "image=${FULL_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"
          echo "SHA_TAG=${SHA}" >> "$GITHUB_ENV"
          echo "::notice::Built image → ${FULL_IMAGE}"

      - name: Verify image output
        run: |
          IMAGE="${{ steps.meta.outputs.image }}"
          if [ -z "${IMAGE}" ]; then
            echo "::error::Image output from meta step is empty — check ECR login & ECR_REPOSITORY secret"
            exit 1
          fi
          echo "✅ Image output verified: ${IMAGE}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ env.SHA_TAG }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Trivy: scan the built image ────────────────────────────────────
      - name: Trivy — container image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}:${{ env.SHA_TAG }}
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          exit-code: 0 # warn only (image is already pushed)

      - name: Upload image scan SARIF
        if: always() && hashFiles('trivy-image.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

  # ── 4. Deploy to ECS ─────────────────────────────────────────────────────
  deploy:
    name: "Deploy — Amazon ECS"
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: >-
      github.ref == 'refs/heads/master' &&
      github.event_name == 'push' &&
      needs.build-and-push.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: deploy-ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve image reference
        id: deploy-image
        run: |
          REGISTRY="${{ steps.deploy-ecr-login.outputs.registry }}"
          REPO="${{ env.ECR_REPOSITORY }}"
          SHA="${GITHUB_SHA::8}"

          if [ -z "${REGISTRY}" ]; then
            echo "::error::Amazon ECR registry output is empty"
            exit 1
          fi

          IMAGE="${REGISTRY}/${REPO}:${SHA}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "Resolved deploy image: ${IMAGE}"

      - name: Pre-flight checks
        run: |
          SHA="${GITHUB_SHA::8}"
          FAILED=0

          echo "── 1. Verify image exists in ECR ─────────"
          if aws ecr describe-images \
               --repository-name "${{ env.ECR_REPOSITORY }}" \
               --image-ids imageTag="${SHA}" \
               --query 'imageDetails[0].imageTags' \
               --output text 2>/dev/null; then
            echo "✅ Image ${SHA} found in ${{ env.ECR_REPOSITORY }}"
          else
            echo "::error::❌ Image ${SHA} NOT found in ECR repo ${{ env.ECR_REPOSITORY }}"
            FAILED=1
          fi

          echo ""
          echo "── 2. Verify Secrets Manager secrets ─────"
          for SECRET in medgraph/workos medgraph/ai medgraph/db medgraph/neo4j; do
            if aws secretsmanager describe-secret --secret-id "$SECRET" \
                 --query 'Name' --output text 2>/dev/null; then
              echo "✅ $SECRET"
            else
              echo "::error::❌ Secret $SECRET not found — run .aws/setup-aws-secrets.sh"
              FAILED=1
            fi
          done

          echo ""
          echo "── 3. Verify / create CloudWatch log group "
          aws logs create-log-group \
            --log-group-name "/ecs/medgraph-ai" 2>/dev/null \
            && echo "✅ Created /ecs/medgraph-ai" \
            || echo "✅ /ecs/medgraph-ai already exists"

          echo ""
          if [ "$FAILED" -ne 0 ]; then
            echo "::error::Pre-flight checks failed — see errors above"
            exit 1
          fi
          echo "All pre-flight checks passed ✅"

      - name: Update image in task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: .aws/task-definition.json
          container-name: ${{ env.ECS_CONTAINER_NAME }}
          image: ${{ steps.deploy-image.outputs.image }}

      - name: Register new task definition
        id: register-task-def
        run: |
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json "file://${{ steps.render-task-def.outputs.task-definition }}" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "arn=${TASK_DEF_ARN}" >> "$GITHUB_OUTPUT"
          echo "Registered task definition: ${TASK_DEF_ARN}"

      - name: Deploy to Amazon ECS
        run: |
          aws ecs update-service \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --service "${{ env.ECS_SERVICE }}" \
            --task-definition "${{ steps.register-task-def.outputs.arn }}" \
            --load-balancers '[{"targetGroupArn":"${{ env.TARGET_GROUP_ARN }}","containerName":"${{ env.ECS_CONTAINER_NAME }}","containerPort":3000}]' \
            --force-new-deployment \
            --query 'service.deployments[0].{status:status,desired:desiredCount,running:runningCount}' \
            --output table
          echo "Deployment triggered ✅"

      - name: Wait for service stability
        timeout-minutes: 15
        run: |
          echo "Waiting for service to stabilize (up to 15 min)…"
          aws ecs wait services-stable \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVICE }}"
          echo "Service is stable ✅"

      - name: Diagnose deployment failure
        if: failure()
        run: |
          echo "============================================"
          echo "  DEPLOYMENT FAILED — Collecting diagnostics"
          echo "============================================"

          echo ""
          echo "── Service events (last 10) ──────────────"
          aws ecs describe-services \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVICE }}" \
            --query 'services[0].events[:10].[createdAt,message]' \
            --output table 2>/dev/null || true

          echo ""
          echo "── Stopped tasks ─────────────────────────"
          TASK_ARNS=$(aws ecs list-tasks \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --service-name "${{ env.ECS_SERVICE }}" \
            --desired-status STOPPED \
            --query 'taskArns[:3]' \
            --output text 2>/dev/null || true)

          if [ -n "$TASK_ARNS" ] && [ "$TASK_ARNS" != "None" ]; then
            aws ecs describe-tasks \
              --cluster "${{ env.ECS_CLUSTER }}" \
              --tasks $TASK_ARNS \
              --query 'tasks[].{taskArn:taskArn,lastStatus:lastStatus,stoppedReason:stoppedReason,stopCode:stopCode,containers:containers[].{name:name,exitCode:exitCode,reason:reason}}' \
              --output json 2>/dev/null || true
          else
            echo "No stopped tasks found (they may have been cleaned up)"
          fi

          echo ""
          echo "── CloudWatch logs (last 50 lines) ───────"
          LOG_STREAM=$(aws logs describe-log-streams \
            --log-group-name "/ecs/medgraph-ai" \
            --order-by LastEventTime \
            --descending \
            --limit 1 \
            --query 'logStreams[0].logStreamName' \
            --output text 2>/dev/null || true)

          if [ -n "$LOG_STREAM" ] && [ "$LOG_STREAM" != "None" ]; then
            echo "Log stream: $LOG_STREAM"
            aws logs get-log-events \
              --log-group-name "/ecs/medgraph-ai" \
              --log-stream-name "$LOG_STREAM" \
              --limit 50 \
              --query 'events[].message' \
              --output text 2>/dev/null || true
          else
            echo "No log streams found — the container may have failed before writing any logs"
            echo "(check that the CloudWatch log group /ecs/medgraph-ai exists)"
          fi

          echo ""
          echo "============================================"
          echo "  Common causes:"
          echo "  1. Secrets Manager: secret not found or role has no access"
          echo "  2. Image pull failure: image doesn't exist in ECR"
          echo "  3. App crash: check the CloudWatch logs above"
          echo "  4. Network: task can't reach internet (needs NAT gateway)"
          echo "============================================"

